/Script/Engine.RendererSettings]
# Prefer Clarity
r.Tonemapper.Sharpen=0.7
r.TemporalAACurrentFrameWeight=0.2
r.TemporalAASamples=8
r.DefaultFeature.MotionBlur=False
r.CustomDepth=3
r.AntiAliasingMethod=4
# Disable Unused Systems
r.DefaultFeature.AutoExposure=False
r.AllowStaticLighting=False
r.DefaultFeature.AntiAliasing=0
r.DefaultFeature.AmbientOcclusion=True
r.DefaultFeature.AmbientOcclusionStaticFraction=False
r.GenerateMeshDistanceFields=False
r.ReflectionCaptureResolution=512
# General Decisions
r.CustomDepthTemporalAAJitter=True
r.Translucent.UsesLightFunctionAtlas=True
r.pso.PrecompileThreadPoolSizeMax=6
# Water Layer Optimizations
r.Water.SingleLayer.ShadersSupportVSMFiltering=1
r.Water.SingleLayer.VSMFiltinger=1
r.Water.SingleLayerWater.SupportCloudShadow=False
r.Water.SingleLayer.TiledComposite=0
r.Water.SingleLayer.Reflection=2
r.SingleLayerWater.UsesLightFunctionAtlas=True
r.DepthOfFieldQuality=0
# Frame Timing
# Warning: Do not add a vsync variable or game settings will refuse to apply player value
# Vsync Default
r.vsync=1
# End Vsync Default
rhi.SyncInterval=0
r.GTSyncType=2
r.OneFrameThreadLag=1
rhi.SyncSlackMS=8
t.MaxFPS=120
r.DontLimitOnBattery=1
r.Velocity.EnableVertexDeformation=1
# Nanite Optimizations
r.Nanite.MaxPixelsPerEdge=2
r.VolumetricFog.GridSizeZ=4
# VSM Optimizations
r.Shadow.Virtual.Enable=1
r.Shadow.Virtual.NonNanite.UseHZB=1
r.Shadow.Virtual.ForceOnlyVirtualShadowMaps=1
# Editor Set Flags
# Add manual settings above this section
r.DBuffer=False
r.SeparateTranslucency=False
r.DefaultFeature.Bloom=False
r.VelocityOutputPass=1
r.SelectiveBasePassOutputs=True
r.SupportLocalFogVolumes=False
xr.VRS.FoveationLevel=0
r.VRS.Support=False
r.MeshStreaming=True
r.SupportStationarySkylight=False
r.SupportLowQualityLightmaps=False
r.SupportPointLightWholeSceneShadows=False
r.Mobile.AllowDistanceFieldShadows=False
r.Mobile.EnableStaticAndCSMShadowReceivers=False
# HZB Optimizations
r.HZBOcclusion=1
# Supporession of Nanite shadow warning
r.Shadow.Virtual.AllowScreenOverflowMessages=0
# Default Upscalers to off
r.FidelityFX.FSR4.Enabled=0
r.XeSS.Enabled=0
r.XeFG.Enabled=False
r.DiscardUnusedQuality=True

